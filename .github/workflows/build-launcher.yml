name: Build SAMP Mobile Launcher

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          cache: 'yarn'
      
      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Install dependencies
        run: yarn install
      
      - name: Create .env file
        run: |
          echo "LINK_SITE=${{ secrets.LINK_SITE }}" >> .env
          echo "LINK_VK=${{ secrets.LINK_VK }}" >> .env
          echo "LINK_DISCORD=${{ secrets.LINK_DISCORD }}" >> .env
          echo "LINK_TIKTOK=${{ secrets.LINK_TIKTOK }}" >> .env
          echo "LINK_DONATE=${{ secrets.LINK_DONATE }}" >> .env
          echo "URL_DONATE_API=${{ secrets.URL_DONATE_API }}" >> .env
          echo "URL_NEWS_API=${{ secrets.URL_NEWS_API }}" >> .env
          echo "URL_DISTRIBUTION=${{ secrets.URL_DISTRIBUTION }}" >> .env
          echo "PACKAGE_NAME=${{ secrets.PACKAGE_NAME }}" >> .env
          echo "PROJECT_NAME='${{ secrets.PROJECT_NAME }}'" >> .env
          echo "APP_VERSION=${{ secrets.APP_VERSION }}" >> .env
          echo "LINK_FORUM_HELP=${{ secrets.LINK_FORUM_HELP }}" >> .env
          echo "LINK_SITE_STORAGE=${{ secrets.LINK_SITE_STORAGE }}" >> .env
          echo "LINK_SITE_NEWS=${{ secrets.LINK_SITE_NEWS }}" >> .env
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: Touch-Mobile-Dark-v${{ secrets.APP_VERSION }}
          path: android/app/build/outputs/apk/release/app-release.apk
