name: Build SAMP Mobile Launcher

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'yarn'
      
      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Install dependencies
        run: yarn install
      
      # ⭐ Проверяем, что .env существует (необязательно, для отладки)
      - name: Check .env file
        run: |
          if [ -f .env ]; then
            echo "✅ .env file found"
            cat .env | grep -v "PASSWORD\|SECRET"  # покажет содержимое без паролей
          else
            echo "❌ .env file not found!"
            exit 1
          fi
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAMP-Mobile-Launcher-RN-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
